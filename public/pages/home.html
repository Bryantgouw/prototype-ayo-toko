<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AYO Toko</title>

  <!-- Important Links -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link rel="stylesheet" href="../css/home.css"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</head>

<body>
    <div class="app-wrapper">
        <header class="main-header">
            <div class="container">
                <div class="valign-wrapper white-text">
                    <i class="material-icons medium">account_circle</i>
                    <h5 id="user-greeting" class="user-greeting">Hallo, Pemilik Toko !</h5>
                </div>
            </div>

            <div class="container">
                <div class="card balance-card-rounded">
                    <div class="card-content no-padding-v">
                        <div class="row margin-0 valign-wrapper">
                            <div class="col s6 center-align border-right-light">
                                <div class="item-wrapper">
                                    <img src="../assets/images/koin.png" class="balance-icon">
                                    <div class="text-wrapper">
                                        <span id="display-rupiah" class="balance-text">Rp 0</span>
                                        <span id="display-koin" class="red-text sub-label">0 Koin</span>
                                    </div>
                                </div>
                            </div>
                            <div class="col s6 center-align">
                                <div class="item-wrapper">
                                    <img src="../assets/images/poin.png" class="balance-icon">
                                    <div class="text-wrapper">
                                        <span class="balance-text">Poin Mitra</span>
                                        <span id="display-poin" class="red-text sub-label">0 Poin</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="card-panel white subscription-card">
            <div class="container valign-wrapper">
                <div class="flex-grow">
                    <p class="sub-title">Mitra Langganan</p>
                    <p id="display-mitra" class="sub-desc">Tidak ada mitra</p>
                </div>
                <i class="material-icons grey-text right-icon">chevron_right</i>
            </div>
        </div>

        <div class="container content-shift">
            <div class="row">
                <div class="col s6 m3">
                    <div class="card-panel center-align menu-box">
                        <a href="pilihtoko.html" style="color: inherit; text-decoration: none; display: block;">
                            <img src="../assets/images/belanja.png" alt="belanja" class="responsive-img">
                            <p class="menu-label">Belanja</p>
                        </a>
                    </div>
                </div>
                <div class="col s6 m3">
                    <div class="card-panel center-align menu-box">
                        <a href="" style="color: inherit; text-decoration: none; display: block;">
                            <img src="../assets/images/stok.png" alt="stok" class="responsive-img">
                            <p class="menu-label">Kelola Stok</p>
                        </a>
                    </div>
                </div>
                <div class="col s6 m3">
                    <div class="card-panel center-align menu-box">
                        <a href="selectbude.html" style="color: inherit; text-decoration: none; display: block;">
                            <img src="../assets/images/bude.png" alt="bude" class="responsive-img">
                            <p class="menu-label">Tanya Bude</p>
                        </a>
                    </div>
                </div>
                <div class="col s6 m3">
                    <div class="card-panel center-align menu-box">
                        <a href="lainlain.html" style="color: inherit; text-decoration: none; display: block;">
                            <img src="../assets/images/lain.png" alt="lain" class="responsive-img">
                            <p class="menu-label">Lain-lain</p>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav-fixed">
            <div class="row white z-depth-2 nav-bar-rounded">
                <div class="col s4 center-align nav-item active">
                    <i class="material-icons nav-icons">home</i>
                    <span id="nav-button">Beranda</span>
                </div>
                <div class="col s4 center-align nav-item inactive">
                    <i class="material-icons nav-icons">person</i>
                    <span id="nav-button">Profil</span>
                </div>
                <div class="col s4 center-align nav-item inactive">
                    <a href="notification.html" style="color: inherit; text-decoration: none; display: block;">
                        <i class="material-icons nav-icons">notifications</i>
                        <span id="nav-button">Notifikasi</span>
                    </a>
                </div>
            </div>
        </nav>
    </div>
    <!-- ===== MAIN JS ===== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/belanja.js"></script>
</body>
</html>
