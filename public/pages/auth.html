<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AYO Toko</title>

  <!-- Important Links -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</head>

<body>
    <div class="valign-wrapper login auth">
        <div class="container whole-container">
            <!-- Icon Back -->
            <h1 class="title center-align daftar back-arrow">
                <a href="../pages/login.html" class="material-icons" id="back-icon">arrow_back_ios_new</a>
            </h1>
            <div class="center-align">
                <div class="login-card">

                    <!-- Title -->
                    <h1 class="title center-align"><span>Konfirmasi Kode Keamanan</span></h1>

                    <form id="pin-form">
                        <div class="row kode-keamanan-insert">
                            <!-- Label -->
                            <label class="label-text">
                                Masukkan kode keamanan kamu
                            </label>
                            <div class="col s12 m8 offset-m2 l6 offset-l3">
                                <div class="pin-container">
                                    <input type="number" class="pin-input" maxlength="1" pattern="\d*" inputmode="numeric">
                                    <input type="number" class="pin-input" maxlength="1" pattern="\d*" inputmode="numeric">
                                    <input type="number" class="pin-input" maxlength="1" pattern="\d*" inputmode="numeric">
                                    <input type="number" class="pin-input" maxlength="1" pattern="\d*" inputmode="numeric">
                                    <input type="number" class="pin-input" maxlength="1" pattern="\d*" inputmode="numeric">
                                    <input type="number" class="pin-input" maxlength="1" pattern="\d*" inputmode="numeric">
                                </div>
                            </div>
                        </div>

                        <div class="container register-text">
                            <p class="lupa-kode-keamanan"><a class="signup-button class" href="login.html">Lupa Kode Keamanan?</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
  <!-- ===== MAIN JS ===== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/login.js"></script>
</body>
</html>
