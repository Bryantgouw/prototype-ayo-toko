<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AYO Toko</title>

  <!-- Important Links -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</head>

<body>
    <div class="valign-wrapper login">
        <div class="container center-align">
            <div class="login-card">

            <!-- Title -->
            <h1 class="title center-align"><span>Masuk</span></h1>

            <!-- Label -->
            <label class="label-text">
                Nomor Ponsel<span class="required">*</span>
            </label>
            <form id="login-form">
                <div class="container input-box">
                    <div class="country-code">+62</div>
                    <input type="text" id="phone-input" placeholder="Nomor Ponsel" required>
                </div>

                <!-- Button -->
                <button type="submit" class="waves-effect waves-light btn submit">MASUK</button>
                
                <!-- Register -->
                <div class="container register-text">
                    <p>Pengguna Baru? <a class="signup-button class" href="signup.html">Daftar Disini</a></p>
                </div>
            </form>
            <div class="login-banner-wrapper" style="margin-top: 20px;">
                <img src="../assets/images/panduanSelection.png" alt="Logo Panduan" class="responsive-img" style="max-height: 180px; width: auto; margin: 20px 0 0 0;">
            </div>
            </div>
        </div>
    </div>
    
  <!-- ===== MAIN JS ===== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/login.js"></script>
</body>
</html>
